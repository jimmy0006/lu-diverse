services:
  postgres:
    image: postgres:16-alpine
    container_name: ludiverse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ludiverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ludiverse_password}
      POSTGRES_DB: ${POSTGRES_DB:-ludiverse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ludiverse} -d ${POSTGRES_DB:-ludiverse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ludiverse-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-ludiverse}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ludiverse_password}
      DB_NAME: ${POSTGRES_DB:-ludiverse}
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ludiverse-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
